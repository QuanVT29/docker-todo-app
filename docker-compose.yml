
services:
  # --- BACKEND ---
  backend:
    networks:
      - todo-network
    build: ./backend
    container_name: todo-backend
    depends_on:
      - mongo-db
    environment:
      - MONGO_URI=mongodb://mongo-db:27017/todo-db
    # No need to expose port 3000 outside the machine if using Nginx later

  # --- MONGODB ---
  mongo-db:
    networks:
      - todo-network
    image: mongo:latest
    container_name: todo-db
    volumes:
      - mongo-data:/data/db

  # --- FRONTEND ---
  frontend:
    depends_on:
      - backend
    networks:
      - todo-network
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo-data:

networks:
  todo-network:
    driver: bridge
